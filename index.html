<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon & App Icons ── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Primary SEO ── -->
    <title>TUUG — Not Just Marketing. We Build Growth Systems.</title>
    <meta name="description" content="TUUG is a performance-driven digital marketing agency based in Tamil Nadu, India. We combine branding, performance marketing, and CRM systems to scale your business. Together We Grow." />
    <meta name="keywords" content="digital marketing agency India, performance marketing, branding agency Tamil Nadu, growth systems, social media marketing, TUUG, TuugCRM, lead generation, ROI driven marketing, business scaling" />
    <meta name="author" content="TUUG" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#e02020" />
    <link rel="canonical" href="https://tuug.in" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TUUG" />
    <meta property="og:url" content="https://tuug.in" />
    <meta property="og:title" content="TUUG — Not Just Marketing. We Build Growth Systems." />
    <meta property="og:description" content="Performance-driven branding, marketing, and CRM systems that scale your business. 50+ brands scaled, 3x avg. growth. Together We Grow." />
    <meta property="og:image" content="https://tuug.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TUUG — Together We Grow" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@tuug__" />
    <meta name="twitter:creator" content="@tuug__" />
    <meta name="twitter:title" content="TUUG — Not Just Marketing. We Build Growth Systems." />
    <meta name="twitter:description" content="Performance-driven branding, marketing, and CRM systems that scale your business. 50+ brands scaled, 3x avg. growth." />
    <meta name="twitter:image" content="https://tuug.in/og-image.png" />
    <meta name="twitter:image:alt" content="TUUG — Together We Grow" />

    <!-- ── Geo / Local SEO ── -->
    <meta name="geo.region" content="IN-TN" />
    <meta name="geo.placename" content="Tamil Nadu, India" />
    <meta name="language" content="English" />

    <!-- ── Structured Data: Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TUUG",
      "alternateName": "TUUG Growth Systems",
      "url": "https://tuug.in",
      "logo": "https://tuug.in/tuug-logo.jpeg",
      "description": "TUUG is a performance-driven digital marketing agency combining branding, performance marketing, and growth systems to scale businesses.",
      "slogan": "Together We Grow",
      "foundingLocation": {
        "@type": "Place",
        "name": "Tamil Nadu, India"
      },
      "areaServed": "IN",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "info.tuug@gmail.com",
          "contactType": "customer service",
          "availableLanguage": ["English", "Tamil"]
        }
      ],
      "sameAs": [
        "https://instagram.com/tuug.__"
      ]
    }
    </script>

    <!-- ── Structured Data: WebSite (Sitelinks Searchbox) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://tuug.in",
      "name": "TUUG",
      "description": "Performance-driven growth systems for brands that want real results.",
      "inLanguage": "en-IN"
    }
    </script>

    <!-- ── Structured Data: LocalBusiness ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MarketingAgency",
      "name": "TUUG",
      "image": "https://tuug.in/tuug-logo.jpeg",
      "url": "https://tuug.in",
      "email": "info.tuug@gmail.com",
      "telephone": "+919384538848",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Tamil Nadu",
        "addressCountry": "IN"
      },
      "priceRange": "₹₹",
      "description": "Performance-driven digital marketing agency specialising in branding, performance marketing, and growth systems.",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "TUUG Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Brand Identity & Strategy" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Performance Marketing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Social Media Marketing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "TuugCRM – Growth CRM System" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Lead Generation" } }
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
